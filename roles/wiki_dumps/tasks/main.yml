---
- name: Create public dump directory
  ansible.builtin.file:
    path: "{{ wiki_dumps_public_dir }}"
    state: directory
    owner: "{{ mediawiki.system_user }}"
    group: "{{ mediawiki.system_group }}"
    mode: "0755"

- name: Deploy site
  ansible.builtin.copy:
    src: "site/{{ item }}"
    dest: "{{ wiki_dumps_public_dir }}/{{ item }}"
    owner: "{{ mediawiki.system_user }}"
    group: "{{ mediawiki.system_group }}"
    directory_mode: "0755"
    mode: "0644"
  loop:
    - favicon.png
    - assets/

- name: Deploy index
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ wiki_dumps_public_dir }}/index.html"
    owner: "{{ mediawiki.system_user }}"
    group: "{{ mediawiki.system_group }}"
    mode: "0644"

- name: Deploy dump script
  ansible.builtin.copy:
    src: wiki_dump.sh
    dest: /usr/local/sbin/wiki_dump
    mode: "0755"
    owner: root
    group: root

- name: Deploy dump filter
  ansible.builtin.copy:
    src: dump_filter.py
    dest: /usr/local/sbin/wiki_dump_filter
    mode: "0755"
    owner: root
    group: root

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: wiki_dump.service.j2
    dest: /etc/systemd/system/wiki_dump.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy systemd timer unit
  ansible.builtin.template:
    src: wiki_dump.timer.j2
    dest: /etc/systemd/system/wiki_dump.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start timer
  ansible.builtin.systemd:
    name: wiki_dump.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Check if latest dump exists
  ansible.builtin.stat:
    path: "{{ wiki_dumps_public_dir }}/latest.xml.gz"
  register: latest_dump

- name: Run initial dump if latest.xml.gz does not exist
  ansible.builtin.systemd:
    name: wiki_dump.service
    state: started
  when: not latest_dump.stat.exists
