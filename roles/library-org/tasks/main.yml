---
- name: Install packages
  apt:
    package:
      - python3-pip
      - python3-setuptools
      - python3-virtualenv

- name: Create group
  group:
    name: library-org
    system: true
    state: present

- name: Create user
  user:
    name: library-org
    system: true
    shell: /sbin/nologin
    group: library-org
    createhome: false
    home: /srv/library-org

- name: Extract library code
  git:
    dest: /srv/library-org
    repo: https://github.com/noisebridge/library-org.git
    version: "{{ library_org_version }}"
  notify:
    - restart library-org

- name: Configure library-org
  template:
    src: library.cfg.j2
    dest: /srv/library-org/library.cfg
    mode: "0644"
  notify:
    - restart library-org

- name: Setup virtual env
  pip:
    requirements: /srv/library-org/requirements.txt
    virtualenv: /srv/library-org/venv
  notify:
    - restart library-org

- name: Setup database file
  file:
    path: /srv/library-org/database/books.sqlite
    owner: library-org
    group: library-org
    mode: "0644"

- name: Create systemd service unit
  template:
    src: library-org.service.j2
    dest: /etc/systemd/system/library-org.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart library-org

- name: Ensure library-org service is started and enabled
  systemd:
    daemon_reload: true
    name: library-org.service
    state: started
    enabled: true
