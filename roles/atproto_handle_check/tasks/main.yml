---
- name: Install check dependencies (dig, curl)
  ansible.builtin.apt:
    package:
      - bind9-dnsutils
      - curl
    state: present

- name: Ensure node_exporter textfile directory exists
  ansible.builtin.file:
    path: "{{ atproto_handle_metrics_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy atproto handle check script
  ansible.builtin.copy:
    src: check_atproto_handle.sh
    dest: /usr/local/sbin/check_atproto_handle
    mode: "0755"
    owner: root
    group: root

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: atproto_handle_check.service.j2
    dest: /etc/systemd/system/atproto_handle_check.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy systemd timer unit
  ansible.builtin.template:
    src: atproto_handle_check.timer.j2
    dest: /etc/systemd/system/atproto_handle_check.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start timer
  ansible.builtin.systemd:
    name: atproto_handle_check.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Run an initial check now to publish metrics
  ansible.builtin.systemd:
    name: atproto_handle_check.service
    state: started
