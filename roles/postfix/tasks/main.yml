---
- name: Install postfix
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    package:
      - postfix
      - postfix-pcre
      - postgrey
      - procmail
      - opendkim
      - opendkim-tools
  tags:
    - postfix
    - mail

- name: Install procmailrc
  ansible.builtin.copy:
    src: procmailrc
    dest: /etc/procmailrc
    owner: root
    group: root
    mode: "0644"
  tags:
    - postfix

- name: Configure postgrey
  ansible.builtin.replace:
    dest: /etc/default/postgrey
    regexp: "POSTGREY_OPTS=.*"
    replace: "POSTGREY_OPTS=\"--inet=10023 --delay=60\""
    mode: "0644"
  tags:
    - postgrey
    - postfix
  notify:
    - Restart postgrey

- name: Configure postgrey whitelist_clients
  ansible.builtin.template:
    src: whitelist_clients.j2
    dest: /etc/postgrey/whitelist_clients
    owner: root
    group: root
    mode: "0644"
  tags:
    - postgrey
    - mail
  notify:
    - Restart postgrey

- name: Disable default configuration
  ansible.builtin.debconf:
    name: "postfix"
    question: "postfix/main_mailer_type"
    vtype: "select"
    value: "No configuration"
  tags:
    - postfix
    - mail

- name: Configure mailname file
  ansible.builtin.copy:
    dest: /etc/mailname
    group: root
    owner: root
    mode: "0644"
    content: "{{ postfix_mailname | default(ansible_fqdn) }}\n"
  tags:
    - postfix
    - mail

- name: Install postfix configuration
  ansible.builtin.template:
    src: main.cf
    dest: /etc/postfix/main.cf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart postfix
  tags:
    - postfix
    - mail

- name: Configure aliases
  ansible.builtin.template:
    src: aliases.j2
    dest: /etc/aliases
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload-aliases
  tags:
    - postfix
    - mail

- name: Copy config files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/postfix/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  with_items:
    - header_checks.regexp
    - smtp_reply_filter
  tags:
    - postfix
    - mail
  notify:
    - Restart postfix

- name: Setup opendkim postfix socket dir
  ansible.builtin.file:
    path: /var/spool/postfix/opendkim
    state: directory
    owner: opendkim
    group: postfix
    mode: "0755"

- name: Copy dkim key
  ansible.builtin.copy:
    src: postfix/dkim.key
    dest: /etc/dkimkeys/dkim.key
    owner: opendkim
    group: opendkim
    mode: "0400"
  notify:
    - restart opendkim

- name: Install opendkim configuration
  ansible.builtin.template:
    src: opendkim.conf.j2
    dest: /etc/opendkim.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart opendkim

- name: Install opendkim defaults
  ansible.builtin.template:
    src: opendkim-default.j2
    dest: /etc/default/opendkim
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart opendkim

- name: Add postfix user to opedkim group
  ansible.builtin.user:
    name: postfix
    groups: opendkim
    append: true
  notify:
    - Restart postfix

- name: Configure secure submission port
  ansible.builtin.replace:
    regexp: "^#submission .*"
    replace: "submission inet n       -       -       -       -       smtpd"
    dest: /etc/postfix/master.cf
    mode: "0644"
  tags:
    - postfix
    - mail
  notify:
    - Restart postfix

- name: Deploy hash map files
  ansible.builtin.copy:
    src: "maps/{{ item }}"
    dest: "/etc/postfix/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  register: postfix_hash_maps
  with_items:
    - client_access
    - sender_access
    - transport
  tags:
    - postfix
    - mail
    - hashmaps
  notify:
    - postmap-hash
