---
alertmanager_web_listen_address: "[::1]:9093"

alertmanager_smtp:
  from: alerts@noisebridge.net
  smarthost: localhost:587

alertmanager_receivers:
  - name: email
    email_configs:
      - to: alerts@noisebridge.net

alertmanager_route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 24h
  receiver: email
