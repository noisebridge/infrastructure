---
blackbox_exporter_web_listen_address: "127.0.0.1:9115"

blackbox_smtp_query_response:
  - expect: "^220 ([^ ]+) ESMTP (.+)$"
  - send: "EHLO prober"
  - expect: "^250-STARTTLS"
  - send: "STARTTLS"
  - expect: "^220"
  - starttls: true
  - send: "EHLO prober"
  - expect: "^250-"
  - send: "QUIT"

blackbox_exporter_configuration_modules:
  http_2xx_v4:
    prober: http
    http:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
  http_2xx_v6:
    prober: http
    http:
      preferred_ip_protocol: "ip6"
      ip_protocol_fallback: false
  smtp_starttls_v4:
    prober: tcp
    tcp:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
      query_response: "{{ blackbox_smtp_query_response }}"
  smtp_starttls_v6:
    prober: tcp
    tcp:
      preferred_ip_protocol: "ip6"
      ip_protocol_fallback: false
      query_response: "{{ blackbox_smtp_query_response }}"
  # atproto / Bluesky handle verification: confirm the _atproto.noisebridge.net
  # TXT record resolves to our DID. The scrape target is the DNS server to query
  # (central resolvers + our authoritative ns), so probe_success only goes to 1
  # when that resolver returns an answer matching the DID at request time.
  dns_atproto_txt:
    prober: dns
    timeout: 5s
    dns:
      query_name: "_atproto.noisebridge.net"
      query_type: "TXT"
      valid_rcodes:
        - NOERROR
      validate_answer_rrs:
        fail_if_not_matching_regexp:
          - 'did=did:plc:4fn5ffs6txnxxozezxio3v7o'
